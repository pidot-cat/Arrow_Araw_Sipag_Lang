name: Arrow Araw — Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Android SDK) ───────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ──────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      # ── 4. Cache pub packages ──────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── 5. Install dependencies ────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. Verify asset folders exist (audio + images) ────────────────────
      - name: Check required asset folders
        run: |
          echo "Checking assets/audio/ ..."
          ls assets/audio/
          echo "Checking assets/images/ ..."
          ls assets/images/

      # ── 7. Run Dart analyzer ───────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: false

      # ── 8. Build debug APK ─────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      # ── 9. Build release APK (signed with debug key for now) ───────────────
      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      # ── 10. Upload APKs as build artifacts ────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: arrow-araw-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: arrow-araw-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── 11. Print build summary ────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "✅ Build complete!"
          echo "Debug APK:   build/app/outputs/flutter-apk/app-debug.apk"
          echo "Release APK: build/app/outputs/flutter-apk/app-release.apk"
          ls -lh build/app/outputs/flutter-apk/*.apk
